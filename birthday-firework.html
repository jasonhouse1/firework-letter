<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>給 Melody · 幾何煙火 · 0306</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050510;
      font-family: 'Trebuchet MS', 'Segoe UI', cursive, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .watermark {
      position: fixed;
      bottom: 25px;
      right: 30px;
      color: rgba(255, 220, 240, 0.4);
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 4px;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(255, 150, 200, 0.3);
      font-family: 'Trebuchet MS', cursive;
      transform: rotate(-2deg);
    }
    
    .date {
      position: fixed;
      top: 25px;
      left: 30px;
      color: rgba(255, 200, 230, 0.3);
      font-size: 18px;
      font-family: monospace;
      z-index: 10;
      pointer-events: none;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="watermark">tony</div>
  <div class="date">0306</div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d', { alpha: false });

      // ========== 響應式設定 ==========
      let W, H, CX, CY;
      
      function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        CX = W / 2;
        CY = H / 2;
        
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        
        ctx.shadowColor = 'rgba(255, 200, 230, 0.5)';
        ctx.shadowBlur = 15;
        ctx.lineWidth = 2;
      }
      
      // ========== 全域變數 ==========
      let time = 0;
      let lastTimestamp = 0;
      let startTime = performance.now();
      
      // 煙火系統 - 只有2-3發
      let fireworks = [];
      let particles = [];
      let lines = []; // 線條特效
      
      // 文字系統 - 2D顯示
      let mainTextAlpha = 0;
      let messageAlpha = 0;
      let message2Alpha = 0;
      let endingAlpha = 0;
      let optionalEndingAlpha = 0;
      
      // 事件標記
      let stage = 0; // 0:開場, 1:主煙火, 2:第一段文字, 3:第二煙火, 4:第二段文字, 5:第三煙火, 6:結尾
      
      // 幾何圖形參數
      let geometry = [];
      
      const optionalEnding = {
        enabled: false,
        photoSrc: '',
        title: '',
        messageLines: [],
        accent: '#ffd5e5'
      };
      const optionalEndingImage = new Image();

      if (optionalEnding.photoSrc) {
        optionalEndingImage.src = optionalEnding.photoSrc;
      }
      
      // ========== 亂數 ==========
      const rand = (min, max) => Math.random() * (max - min) + min;
      const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
      
      // ========== 煙火類 - 每個煙火都有自己的風格 ==========
      class Firework {
        constructor(targetX, targetY, style) {
          // 從不同方向發射
          const angle = rand(0, Math.PI * 2);
          const distance = rand(600, 1000);
          
          this.x = targetX + Math.cos(angle) * distance;
          this.y = targetY + Math.sin(angle) * distance * 0.6; // 垂直壓縮
          this.z = rand(200, 500);
          
          this.tx = targetX;
          this.ty = targetY;
          this.tz = rand(-20, 20);
          
          this.style = style; // 'geometric', 'spiral', 'ring', 'star', 'willow'
          this.progress = 0;
          this.done = false;
          this.trail = [];
          
          // 計算速度
          const dx = this.tx - this.x;
          const dy = this.ty - this.y;
          const dz = this.tz - this.z;
          const dist = Math.hypot(dx, dy, dz);
          const speed = rand(8, 12);
          this.vx = dx / dist * speed;
          this.vy = dy / dist * speed;
          this.vz = dz / dist * speed;
        }
        
        update() {
          this.trail.push({ x: this.x, y: this.y, z: this.z });
          if (this.trail.length > 10) this.trail.shift();
          
          this.x += this.vx;
          this.y += this.vy;
          this.z += this.vz;
          
          if (Math.hypot(this.tx - this.x, this.ty - this.y, this.tz - this.z) < 30) {
            this.done = true;
            createFireworkEffect(this.tx, this.ty, this.tz, this.style);
          }
        }
        
        draw() {
          // 繪製軌跡
          for (let i = 0; i < this.trail.length; i++) {
            const p = this.trail[i];
            const alpha = (i + 1) / this.trail.length * 0.6;
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2 + i * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 220, 180, ${alpha})`;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffaa88';
            ctx.fill();
          }
          
          // 繪製火箭頭
          ctx.beginPath();
          ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
          ctx.fillStyle = '#fff2d0';
          ctx.shadowBlur = 25;
          ctx.shadowColor = '#ffaa88';
          ctx.fill();
        }
      }

      // ========== 粒子類 (輔助) ==========
      class Particle {
        constructor(x, y, vx, vy, color, life, size) {
          this.x = x; this.y = y;
          this.vx = vx; this.vy = vy;
          this.color = color;
          this.life = life; this.maxLife = life;
          this.size = size;
        }
        
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.vy += 0.05; // 重力
          this.vx *= 0.99;
          this.vy *= 0.99;
          this.life--;
        }
        
        draw() {
          const alpha = this.life / this.maxLife;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = this.color;
          ctx.fill();
          ctx.restore();
        }
      }

      // ========== 線條特效類 ==========
      class LineEffect {
        constructor(points, color, life, width = 2) {
          this.points = points; // 點陣列
          this.color = color;
          this.life = life;
          this.maxLife = life;
          this.width = width;
        }
        
        update() {
          this.life--;
        }
        
        draw() {
          if (this.points.length < 2) return;
          
          const alpha = this.life / this.maxLife;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = this.color;
          ctx.lineWidth = this.width * alpha;
          ctx.shadowBlur = 15;
          ctx.shadowColor = this.color;
          ctx.beginPath();
          ctx.moveTo(this.points[0].x, this.points[0].y);
          
          for (let i = 1; i < this.points.length; i++) {
            ctx.lineTo(this.points[i].x, this.points[i].y);
          }
          
          ctx.stroke();
          ctx.restore();
        }
      }

      // ========== 幾何圖形類 ==========
      class GeometryEffect {
        constructor(x, y, type, color, size, life) {
          this.x = x;
          this.y = y;
          this.type = type; // 'circle', 'square', 'triangle', 'star'
          this.color = color;
          this.size = size;
          this.life = life;
          this.maxLife = life;
          this.rotation = rand(0, Math.PI * 2);
          this.rotationSpeed = rand(-0.02, 0.02);
        }
        
        update() {
          this.life--;
          this.rotation += this.rotationSpeed;
          this.size *= 0.99;
        }
        
        draw() {
          const alpha = this.life / this.maxLife;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          ctx.shadowBlur = 20;
          ctx.shadowColor = this.color;
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 2 * alpha;
          ctx.fillStyle = this.color.replace(')', ', 0.2)').replace('hsl', 'hsla');
          
          switch(this.type) {
            case 'circle':
              ctx.beginPath();
              ctx.arc(0, 0, this.size, 0, Math.PI * 2);
              ctx.fill();
              ctx.stroke();
              break;
              
            case 'square':
              ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);
              ctx.strokeRect(-this.size, -this.size, this.size * 2, this.size * 2);
              break;
              
            case 'triangle':
              ctx.beginPath();
              ctx.moveTo(0, -this.size * 1.5);
              ctx.lineTo(this.size * 1.3, this.size);
              ctx.lineTo(-this.size * 1.3, this.size);
              ctx.closePath();
              ctx.fill();
              ctx.stroke();
              break;
              
            case 'star':
              const spikes = 5;
              const outer = this.size;
              const inner = this.size * 0.4;
              let rot = Math.PI / 2 * 3;
              const step = Math.PI / spikes;
              
              ctx.beginPath();
              for (let i = 0; i < spikes; i++) {
                const x1 = Math.cos(rot) * outer;
                const y1 = Math.sin(rot) * outer;
                ctx.lineTo(x1, y1);
                rot += step;
                
                const x2 = Math.cos(rot) * inner;
                const y2 = Math.sin(rot) * inner;
                ctx.lineTo(x2, y2);
                rot += step;
              }
              ctx.closePath();
              ctx.fill();
              ctx.stroke();
              break;
          }
          
          ctx.restore();
        }
      }

      // ========== 建立煙火特效 ==========
      function createFireworkEffect(x, y, z, style) {
        const colors = [
          `hsl(${rand(320, 360)}, 90%, 70%)`, // 粉紅
          `hsl(${rand(40, 60)}, 90%, 70%)`,   // 金
          `hsl(${rand(280, 320)}, 90%, 70%)`, // 紫
          `hsl(${rand(180, 220)}, 90%, 70%)`, // 藍
        ];
        
        const mainColor = colors[0];
        
        switch(style) {
          case 'geometric': // 幾何圖形煙火
            for (let i = 0; i < 30; i++) {
              const type = ['circle', 'square', 'triangle', 'star'][randInt(0, 3)];
              const color = colors[randInt(0, colors.length-1)];
              const size = rand(10, 25);
              const life = rand(80, 120);
              geometry.push(new GeometryEffect(
                x + rand(-30, 30), 
                y + rand(-30, 30), 
                type, color, size, life
              ));
            }
            break;
            
          case 'spiral': // 螺旋線條
            const points = [];
            const spiralTurns = 4;
            const pointsCount = 40;
            
            for (let i = 0; i < pointsCount; i++) {
              const progress = i / pointsCount;
              const angle = progress * Math.PI * 2 * spiralTurns;
              const radius = progress * 150;
              const px = x + Math.cos(angle) * radius;
              const py = y + Math.sin(angle) * radius * 0.6;
              points.push({ x: px, y: py });
            }
            
            lines.push(new LineEffect(points, mainColor, 90, 3));
            
            // 加反向螺旋
            const points2 = [];
            for (let i = 0; i < pointsCount; i++) {
              const progress = i / pointsCount;
              const angle = -progress * Math.PI * 2 * spiralTurns;
              const radius = progress * 150;
              const px = x + Math.cos(angle) * radius;
              const py = y + Math.sin(angle) * radius * 0.6;
              points2.push({ x: px, y: py });
            }
            lines.push(new LineEffect(points2, colors[1], 90, 3));
            break;
            
          case 'ring': // 環狀 + 射線
            // 環
            for (let r = 0; r < 3; r++) {
              const radius = 50 + r * 40;
              const points = [];
              for (let i = 0; i < 24; i++) {
                const angle = (i / 24) * Math.PI * 2;
                const px = x + Math.cos(angle) * radius;
                const py = y + Math.sin(angle) * radius * 0.6;
                points.push({ x: px, y: py });
              }
              // 閉合
              points.push(points[0]);
              lines.push(new LineEffect(points, colors[r % colors.length], 70, 2));
            }
            
            // 射線
            for (let i = 0; i < 16; i++) {
              const angle = (i / 16) * Math.PI * 2;
              const rayPoints = [
                { x, y },
                { x: x + Math.cos(angle) * 200, y: y + Math.sin(angle) * 200 * 0.6 }
              ];
              lines.push(new LineEffect(rayPoints, colors[i % colors.length], 50, 1.5));
            }
            break;
            
          case 'willow': // 柳樹型 (垂落線條)
            for (let i = 0; i < 12; i++) {
              const angle = rand(-0.3, 0.3) - Math.PI/2;
              const points = [];
              const length = rand(150, 250);
              const segments = 15;
              
              for (let j = 0; j <= segments; j++) {
                const progress = j / segments;
                const px = x + Math.cos(angle) * progress * length * 0.8;
                const py = y + Math.sin(angle) * progress * length + Math.sin(progress * Math.PI) * 40;
                points.push({ x: px, y: py });
              }
              
              lines.push(new LineEffect(points, colors[i % colors.length], 80, 2.5));
            }
            break;
            
          case 'star': // 星星爆發
            for (let i = 0; i < 8; i++) {
              const angle = (i / 8) * Math.PI * 2;
              const points = [
                { x, y },
                { x: x + Math.cos(angle) * 180, y: y + Math.sin(angle) * 180 * 0.6 }
              ];
              lines.push(new LineEffect(points, colors[i % colors.length], 60, 3));
            }
            
            // 小粒子點綴
            for (let i = 0; i < 50; i++) {
              const angle = rand(0, Math.PI * 2);
              const speed = rand(2, 5);
              particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                colors[randInt(0, colors.length-1)],
                rand(40, 70),
                rand(2, 4)
              ));
            }
            break;
        }
        
        // 所有風格都加一點基礎粒子
        for (let i = 0; i < 30; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(1, 3);
          particles.push(new Particle(
            x, y,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            colors[randInt(0, colors.length-1)],
            rand(50, 80),
            rand(2, 4)
          ));
        }
      }

      // ========== 2D 文字繪製 ==========
      function drawTexts() {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.shadowBlur = 25;
        ctx.shadowColor = '#ffaacc';
        
        // MELODY 大字
        if (mainTextAlpha > 0.01) {
          ctx.font = 'bold 100px "Trebuchet MS", "Segoe UI", cursive, sans-serif';
          const gradient = ctx.createLinearGradient(CX - 150, 0, CX + 150, 0);
          gradient.addColorStop(0, '#ffb6c1');
          gradient.addColorStop(0.5, '#ffe5b4');
          gradient.addColorStop(1, '#ffb6c1');
          
          ctx.fillStyle = gradient;
          ctx.globalAlpha = mainTextAlpha;
          ctx.fillText('MELODY', CX, CY - 60);
        }
        
        // by 邱
        if (mainTextAlpha > 0.01) {
          ctx.font = '50px "Trebuchet MS", cursive';
          ctx.fillStyle = '#ffe5b4';
          ctx.globalAlpha = mainTextAlpha * 0.9;
          ctx.fillText('by 邱', CX + 150, CY);
        }
        
        // 第一段訊息
        if (messageAlpha > 0.01) {
          ctx.font = '70px "Trebuchet MS", cursive';
          const gradient = ctx.createLinearGradient(CX - 200, 0, CX + 200, 0);
          gradient.addColorStop(0, '#ffb6c1');
          gradient.addColorStop(0.5, '#ffe5b4');
          gradient.addColorStop(1, '#ffb6c1');
          
          ctx.fillStyle = gradient;
          ctx.globalAlpha = messageAlpha;
          ctx.fillText('送給我的寶寶', CX, CY + 60);
        }
        
        // 第二段訊息
        if (message2Alpha > 0.01) {
          ctx.font = '60px "Trebuchet MS", cursive';
          ctx.fillStyle = '#ffd5e5';
          ctx.globalAlpha = message2Alpha;
          ctx.fillText('生日快樂', CX, CY + 60);
        }
        
        // 結尾
        if (endingAlpha > 0.01) {
          ctx.font = '40px "Trebuchet MS", cursive';
          ctx.fillStyle = '#fff0f5';
          ctx.globalAlpha = endingAlpha;
          ctx.fillText('0306', CX, CY - 40);
          
          ctx.font = '30px "Trebuchet MS", cursive';
          ctx.fillStyle = '#ffd5e5';
          ctx.fillText('— 永遠愛你', CX, CY + 20);
        }
        
        ctx.restore();
      }

      // ========== 繪製背景 ==========
      function drawOptionalEnding() {
        if (!optionalEnding.enabled || optionalEndingAlpha <= 0.01) return;

        const hasPhoto = Boolean(optionalEnding.photoSrc && optionalEnding.photoSrc.trim());
        const hasCardText = Boolean(
          optionalEnding.title ||
          (optionalEnding.messageLines && optionalEnding.messageLines.length)
        );

        if (!hasPhoto && !hasCardText) return;

        const panelWidth = Math.min(W * 0.72, 520);
        const panelHeight = hasPhoto ? Math.min(H * 0.42, 340) : Math.min(H * 0.26, 210);
        const panelX = CX - panelWidth / 2;
        const panelY = CY + 70;
        const panelRadius = 24;

        ctx.save();
        ctx.globalAlpha = optionalEndingAlpha;
        ctx.shadowBlur = 30;
        ctx.shadowColor = 'rgba(255, 190, 220, 0.28)';

        ctx.fillStyle = 'rgba(20, 16, 36, 0.68)';
        ctx.beginPath();
        ctx.moveTo(panelX + panelRadius, panelY);
        ctx.lineTo(panelX + panelWidth - panelRadius, panelY);
        ctx.quadraticCurveTo(panelX + panelWidth, panelY, panelX + panelWidth, panelY + panelRadius);
        ctx.lineTo(panelX + panelWidth, panelY + panelHeight - panelRadius);
        ctx.quadraticCurveTo(panelX + panelWidth, panelY + panelHeight, panelX + panelWidth - panelRadius, panelY + panelHeight);
        ctx.lineTo(panelX + panelRadius, panelY + panelHeight);
        ctx.quadraticCurveTo(panelX, panelY + panelHeight, panelX, panelY + panelHeight - panelRadius);
        ctx.lineTo(panelX, panelY + panelRadius);
        ctx.quadraticCurveTo(panelX, panelY, panelX + panelRadius, panelY);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = 'rgba(255, 214, 229, 0.35)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        if (hasPhoto) {
          const photoMargin = 18;
          const photoHeight = hasCardText ? panelHeight * 0.58 : panelHeight - photoMargin * 2;
          const photoY = panelY + photoMargin;
          const photoWidth = panelWidth - photoMargin * 2;

          if (optionalEndingImage.complete && optionalEndingImage.naturalWidth > 0) {
            ctx.drawImage(optionalEndingImage, panelX + photoMargin, photoY, photoWidth, photoHeight);
          } else {
            ctx.fillStyle = 'rgba(255, 245, 250, 0.08)';
            ctx.fillRect(panelX + photoMargin, photoY, photoWidth, photoHeight);

            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(255, 230, 240, 0.42)';
            ctx.font = '18px "Trebuchet MS", sans-serif';
            ctx.fillText('PHOTO', CX, photoY + photoHeight / 2 + 6);
          }

          ctx.strokeStyle = 'rgba(255, 230, 240, 0.2)';
          ctx.strokeRect(panelX + photoMargin, photoY, photoWidth, photoHeight);
        }

        if (hasCardText) {
          const textBaseY = hasPhoto ? panelY + panelHeight * 0.72 : panelY + 62;

          if (optionalEnding.title) {
            ctx.textAlign = 'center';
            ctx.fillStyle = optionalEnding.accent;
            ctx.font = 'bold 30px "Trebuchet MS", "Segoe UI", cursive, sans-serif';
            ctx.fillText(optionalEnding.title, CX, textBaseY);
          }

          const lines = optionalEnding.messageLines || [];
          if (lines.length) {
            ctx.fillStyle = '#fff3f7';
            ctx.font = '22px "Trebuchet MS", "Segoe UI", sans-serif';
            lines.slice(0, 3).forEach((line, index) => {
              ctx.fillText(line, CX, textBaseY + 34 + index * 28);
            });
          }
        }

        ctx.restore();
      }

      function drawBackground() {
        // 深空漸層
        const gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#030518');
        gradient.addColorStop(0.5, '#0a0820');
        gradient.addColorStop(1, '#020208');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);
        
        // 簡單星星
        for (let i = 0; i < 100; i++) {
          const x = (i * 37) % W;
          const y = (i * 23) % H;
          const size = 1 + Math.sin(time + i) * 0.5;
          const alpha = 0.2 + 0.1 * Math.sin(time * 0.5 + i);
          
          ctx.beginPath();
          ctx.arc(x, y, size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
          ctx.fill();
        }
      }

      // ========== 更新場景 ==========
      function updateScene(now) {
        const elapsed = (now - startTime) / 1000;
        
        // 階段控制 - 只有3發煙火
        if (stage === 0 && elapsed > 1.5) {
          // 第一發煙火 - 幾何風格
          fireworks.push(new Firework(CX, CY - 40, 'geometric'));
          stage = 1;
        }
        
        if (stage === 1 && elapsed > 4.5) {
          // MELODY 文字出現
          mainTextAlpha = 1;
          stage = 2;
        }
        
        if (stage === 2 && elapsed > 7.0) {
          // 第二發煙火 - 螺旋+環狀
          fireworks.push(new Firework(CX - 50, CY - 30, 'spiral'));
          fireworks.push(new Firework(CX + 50, CY - 30, 'ring'));
          stage = 3;
        }
        
        if (stage === 3 && elapsed > 10.0) {
          // 第一段訊息
          messageAlpha = 1;
          stage = 4;
        }
        
        if (stage === 4 && elapsed > 14.0) {
          // 第三發煙火 - 柳樹+星星
          fireworks.push(new Firework(CX, CY - 20, 'willow'));
          fireworks.push(new Firework(CX - 30, CY - 50, 'star'));
          stage = 5;
        }
        
        if (stage === 5 && elapsed > 17.0) {
          // 第二段訊息
          message2Alpha = 1;
          stage = 6;
        }
        
        if (stage === 6 && elapsed > 22.0) {
          // 結尾
          endingAlpha = 1;
          stage = 7;
        }

        if (stage === 7 && elapsed > 25.5) {
          optionalEndingAlpha = optionalEnding.enabled ? 1 : 0;
          stage = 8;
        }
        
        // 文字淡出控制
        if (stage > 2 && mainTextAlpha > 0) {
          mainTextAlpha -= 0.002;
          if (mainTextAlpha < 0) mainTextAlpha = 0;
        }
        
        if (stage > 4 && messageAlpha > 0) {
          messageAlpha -= 0.003;
          if (messageAlpha < 0) messageAlpha = 0;
        }
        
        if (stage > 6 && message2Alpha > 0) {
          message2Alpha -= 0.003;
          if (message2Alpha < 0) message2Alpha = 0;
        }
        
        // 更新煙火
        for (let i = fireworks.length - 1; i >= 0; i--) {
          fireworks[i].update();
          fireworks[i].draw();
          if (fireworks[i].done) fireworks.splice(i, 1);
        }
        
        // 更新粒子
        for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          particles[i].draw();
          if (particles[i].life <= 0) particles.splice(i, 1);
        }
        
        // 更新線條特效
        for (let i = lines.length - 1; i >= 0; i--) {
          lines[i].update();
          lines[i].draw();
          if (lines[i].life <= 0) lines.splice(i, 1);
        }
        
        // 更新幾何圖形
        for (let i = geometry.length - 1; i >= 0; i--) {
          geometry[i].update();
          geometry[i].draw();
          if (geometry[i].life <= 0) geometry.splice(i, 1);
        }
      }

      // ========== 動畫循環 ==========
      function animate(now) {
        const dt = Math.min(30, now - (lastTimestamp || now));
        lastTimestamp = now;
        time += dt * 0.002;
        
        drawBackground();
        updateScene(now);
        drawTexts();
        drawOptionalEnding();
        
        requestAnimationFrame(animate);
      }

      // ========== 點擊增加小驚喜 ==========
      canvas.addEventListener('click', (e) => {
        // 點擊時放一個小煙火
        const style = ['geometric', 'spiral', 'ring', 'willow', 'star'][randInt(0, 4)];
        fireworks.push(new Firework(e.clientX, e.clientY, style));
      });

      // ========== 初始化 ==========
      window.addEventListener('resize', resize);
      resize();
      
      // 開場小煙火
      setTimeout(() => {
        fireworks.push(new Firework(CX - 80, CY - 30, 'star'));
      }, 300);
      
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
